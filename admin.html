<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>화미옥 어드민</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--r:#D4001A;--blk:#0A0A0A;}
body{background:#f5f5f5;font-family:'Noto Sans KR',sans-serif;font-weight:300;color:#1a1a1a;}
header{background:var(--r);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(212,0,26,.3);}
.ht{font-size:18px;font-weight:700;}.hs{font-size:11px;opacity:.7;margin-top:2px;}
.save-btn{background:#fff;color:var(--r);border:none;padding:10px 24px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;}
.container{max-width:1100px;margin:0 auto;padding:24px 20px 80px;}
.section{background:#fff;border-radius:10px;margin-bottom:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.sh{padding:14px 20px;background:var(--blk);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.sh h2{color:#fff;font-size:14px;font-weight:700;}
.sh .cnt{background:var(--r);color:#fff;font-size:10px;padding:2px 8px;border-radius:100px;font-weight:700;}
.sh .arr{color:rgba(255,255,255,.4);margin-left:auto;transition:transform .3s;}
.sh.open .arr{transform:rotate(180deg);}
.sb{padding:20px;display:none;}
.sb.open{display:block;}
.note{font-size:11px;color:#999;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f0f0f0;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
.ii{border:2px solid #e8e8e8;border-radius:8px;overflow:hidden;transition:border-color .2s;}
.ii:hover{border-color:var(--r);}
.ii.has{border-color:#4caf50;}
.prev{width:100%;aspect-ratio:1;background:#f0f0f0;position:relative;overflow:hidden;cursor:pointer;}
.prev img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:#ccc;}
.ph span{font-size:9px;letter-spacing:1px;}
.ii.has .ph{display:none;}
.meta{padding:9px 11px;}
.key{font-size:10px;font-weight:700;color:var(--r);margin-bottom:2px;font-family:monospace;}
.desc{font-size:10px;color:#888;}
.acts{display:flex;gap:5px;margin-top:7px;}
.bu{flex:1;background:var(--r);color:#fff;border:none;padding:6px;font-size:10px;border-radius:3px;cursor:pointer;font-family:inherit;}
.br{background:#f5f5f5;color:#999;border:1px solid #ddd;padding:6px 9px;font-size:10px;border-radius:3px;cursor:pointer;font-family:inherit;}
.br:hover{background:#fee;color:var(--r);}
input[type=file]{display:none;}
.toast{position:fixed;bottom:80px;right:20px;background:var(--blk);color:#fff;padding:10px 18px;border-radius:5px;font-size:12px;z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{transform:none;opacity:1;}
.savebar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:3px solid var(--r);padding:10px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 -4px 16px rgba(0,0,0,.08);z-index:50;}
.sb-info{flex:1;font-size:12px;color:#888;}.sb-info strong{color:var(--r);}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax:220px,1fr));}}
</style>
</head>
<body>
<header>
  <div><div class="ht">화미옥 어드민</div><div class="hs">이미지 관리 · images.json 생성</div></div>
  <button class="save-btn" onclick="saveAll()">💾 JSON 저장</button>
</header>
<div class="container" id="app"></div>
<div class="savebar">
  <div class="sb-info">변경: <strong id="cc">0</strong>개 · 이미지 자동 압축(900px/WebP) · images.js 저장 후 GitHub 루트에 업로드</div>
  <button class="save-btn" style="background:var(--r);color:#fff;" onclick="saveAll()">💾 JSON 저장</button>
</div>
<div class="toast" id="toast"></div>

<script>
var imgs = {};
var changes = 0;

var sections = [
  {
    title:'🎬 히어로 (메인 첫 화면 배경)',
    note:'★ 이 섹션이 페이지를 열었을 때 맨 처음 보이는 전체 화면 배경입니다',
    items:[
      {key:'brand-visual-img', desc:'37년이 증명한다 — 원형 대표 사진'},
    ]
  },
  {
    title:'✅ 이런분께 딱입니다 배경',
    note:'"처음이든, 경험이 있든 화미옥이 정답" 체크리스트 섹션 배경',
    items:[
      {key:'suitable-bg', desc:'★ 이런분께 딱입니다 섹션 배경 (흐릿하게 표시)'},
    ]
  },
  {
    title:'🍲 단 1분이면 끝 — 조리 스텝',
    note:'"재료 담고, 육수 붓고, 끓이면 끝" 3단계 카드 사진',
    items:[
      {key:'step-img-0', desc:'STEP 01 — 육수 넣기'},
      {key:'step-img-1', desc:'STEP 02 — 식재료 넣기'},
      {key:'step-img-2', desc:'STEP 03 — 완성'},
    ]
  },
  {
    title:'☀️🌙 낮에는 식사 / 밤에는 반주',
    note:'페이지 중간 점심·저녁 2분할 섹션 배경',
    items:[
      {key:'lunch-bg',  desc:'★ 점심 섹션 배경 (밝은 톤)'},
      {key:'dinner-bg', desc:'★ 저녁 섹션 배경 (어두운 톤)'},
    ]
  },
  {
    title:'🏆 화미옥의 성공 포인트',
    note:'슬라이더 4장 — 왜 김치찌개인가, 왜 37년인가, 왜 원팩인가, 왜 지금인가',
    items:[
      {key:'why-img-0', desc:'카드 01 — 왜 김치찌개인가'},
      {key:'why-img-1', desc:'카드 02 — 왜 37년인가'},
      {key:'why-img-2', desc:'카드 03 — 왜 원팩인가'},
      {key:'why-img-3', desc:'카드 04 — 왜 지금인가'},
    ]
  },
  {
    title:'🥘 메뉴 이미지',
    note:'탭별 메뉴 원형 사진 — 김치찌개(0), 볶음/돈까스(1), 김치찜(2), 사이드(3)',
    items:[
      {key:'hm-0-0',desc:'김치찌개 탭 — 돼지 김치찌개'},
      {key:'hm-0-1',desc:'김치찌개 탭 — 부대 김치찌개'},
      {key:'hm-0-2',desc:'김치찌개 탭 — 참치 김치찌개'},
      {key:'hm-0-3',desc:'김치찌개 탭 — 돈까스 김치찌개'},
      {key:'hm-1-0',desc:'볶음 탭 — 고추장 제육볶음'},
      {key:'hm-1-1',desc:'볶음 탭 — 간장 돼지불고기'},
      {key:'hm-1-2',desc:'볶음 탭 — 등심돈까스'},
      {key:'hm-2-0',desc:'김치찜 탭 — 돼지 김치찜'},
      {key:'hm-2-1',desc:'김치찜 탭 — 부대 김치찜'},
      {key:'hm-3-0',desc:'사이드 탭 — 햄구이'},
      {key:'hm-3-1',desc:'사이드 탭 — 계란말이'},
      {key:'hm-3-2',desc:'사이드 탭 — 김치말이국수'},
      {key:'hm-3-3',desc:'사이드 탭 — 주먹밥'},
    ]
  },
  {
    title:'🏠 화미옥의 공간 (인테리어)',
    note:'자동 롤링되는 매장 인테리어 사진',
    items:[
      {key:'interior-main',  desc:'인테리어 메인 대표 사진'},
      {key:'interior-sub-0', desc:'인테리어 서브 사진 1'},
      {key:'interior-sub-1', desc:'인테리어 서브 사진 2'},
      {key:'interior-sub-2', desc:'인테리어 서브 사진 3'},
    ]
  },
  {
    title:'⭐ 소비자가 증명한 솔직 후기',
    note:'모바일 슬라이더 리뷰 카드 사진 4장',
    items:[
      {key:'review-img-0',desc:'리뷰 카드 1번'},
      {key:'review-img-1',desc:'리뷰 카드 2번'},
      {key:'review-img-2',desc:'리뷰 카드 3번'},
      {key:'review-img-3',desc:'리뷰 카드 4번'},
    ]
  },
  {
    title:'🔥 37년이 증명한다 (브랜드 스토리)',
    note:'"1987년부터 끓여온 그 맛" 브랜드 섹션 배경',
    items:[
      {key:'brandA-bg', desc:'★ 37년 증명한다 섹션 배경 (흐릿하게 표시)'},
    ]
  },
  {
    title:'🏢 막막한 창업 초기, 본사가 함께합니다',
    note:'본사 지원 중요성 섹션 배경',
    items:[
      {key:'importance-bg', desc:'★ 본사 중요성 섹션 배경 (흐릿하게 표시)'},
    ]
  },
  {
    title:'📋 창업 절차',
    note:'10단계 창업 절차 섹션 배경',
    items:[
      {key:'process-bg', desc:'★ 창업 절차 섹션 배경 (흐릿하게 표시)'},
    ]
  },
];

function build() {
  var app = document.getElementById('app');
  sections.forEach(function(sec, si) {
    var isFirst = si === 0;
    var html = '<div class="section"><div class="sh'+(isFirst?' open':'')+'" onclick="toggle(this)"><h2>'+sec.title+'</h2><span class="cnt">'+sec.items.length+'</span><span class="arr">▼</span></div>';
    html += '<div class="sb'+(isFirst?' open':'')+'">'; 
    if(sec.note) html += '<p class="note">'+sec.note+'</p>';
    html += '<div class="grid">';
    sec.items.forEach(function(item) {
      var k = item.key;
      html += '<div class="ii" id="ii-'+k+'">'
        +'<div class="prev" onclick="pick(\''+k+'\')">'
        +'<img id="p-'+k+'" src="" style="display:none;">'
        +'<div class="ph"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>업로드</span></div>'
        +'</div>'
        +'<div class="meta"><div class="key">'+k+'</div><div class="desc">'+item.desc+'</div>'
        +'<div class="acts"><button class="bu" onclick="pick(\''+k+'\')">업로드</button><button class="br" onclick="del(\''+k+'\')">삭제</button></div>'
        +'</div>'
        +'<input type="file" id="f-'+k+'" accept="image/*" onchange="load(this,\''+k+'\')">'
        +'</div>';
    });
    html += '</div></div></div>';
    app.innerHTML += html;
  });
}

function toggle(el){
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}
function pick(k){ document.getElementById('f-'+k).click(); }
function load(inp, k) {
  var f = inp.files[0]; if(!f) return;
  // 영상은 압축 없이 그대로
  if(f.type.startsWith('video/')){
    var r = new FileReader();
    r.onload = function(e){
      var data = e.target.result;
      imgs[k.replace(/-/g,'_')] = data;
      var p = document.getElementById('p-'+k);
      if(p){p.src='';p.style.display='none';} // 영상은 미리보기 없음
      document.getElementById('ii-'+k).classList.add('has');
      changes++;document.getElementById('cc').textContent=changes;
      toast('✓ '+k+' 영상 업로드 ('+Math.round(f.size/1024)+'KB)');
    };
    r.readAsDataURL(f);
    return;
  }
  // 이미지: Canvas로 리사이즈 + WebP 압축
  var img = new Image();
  var reader = new FileReader();
  reader.onload = function(e){
    img.onload = function(){
      // 이미지 종류별 최대 크기 설정
      var MAX = k.includes('bg') ? 1200 : 600; // 배경은 1200, 메뉴/리뷰는 600
      var w = img.width, h = img.height;
      if(w > MAX || h > MAX){
        if(w > h){ h = Math.round(h * MAX/w); w = MAX; }
        else      { w = Math.round(w * MAX/h); h = MAX; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      // WebP 우선, 없으면 JPEG — 배경 0.7, 기타 0.65
      var quality = k.includes('bg') || k.includes('brand') ? 0.72 : 0.65;
      var data = canvas.toDataURL('image/webp', quality);
      if(!data || data === 'data:,') data = canvas.toDataURL('image/jpeg', quality);
      var kb = Math.round(data.length * 0.75 / 1024);
      imgs[k.replace(/-/g,'_')] = data;
      var p = document.getElementById('p-'+k);
      if(p){p.src=data;p.style.display='block';}
      document.getElementById('ii-'+k).classList.add('has');
      changes++;document.getElementById('cc').textContent=changes;
      toast('✓ '+k+' ('+w+'×'+h+', ~'+kb+'KB)');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}
function del(k){
  delete imgs[k.replace(/-/g,'_')];
  var p=document.getElementById('p-'+k);
  if(p){p.src='';p.style.display='none';}
  document.getElementById('ii-'+k).classList.remove('has');
  document.getElementById('f-'+k).value='';
  changes++;document.getElementById('cc').textContent=changes;
  toast('삭제: '+k);
}
function saveAll(){
  var json = JSON.stringify(imgs);
  var kb = Math.round(json.length * 0.75 / 1024);
  // images.js 로 저장 — <script src> 방식으로 확실하게 로드됨
  var js = 'window.HM_IMGS=' + json + ';';
  var blob=new Blob([js],{type:'application/javascript'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='images.js';a.click();
  changes=0;document.getElementById('cc').textContent='0';
  toast('💾 images.js 저장 완료! (~'+kb+'KB) → GitHub에 올리세요');
}
function toast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

// 히어로 영상 URL 섹션 별도 삽입
(function(){
  var div = document.createElement('div');
  div.className = 'section';
  div.style.cssText = 'border:3px solid var(--r);';
  div.innerHTML = [
    '<div class="sh open" onclick="toggle(this)" style="background:var(--r);">',
      '<h2>🎬 메인 첫 화면 배경 영상</h2>',
      '<span class="cnt" style="background:rgba(0,0,0,.3);">★ 여기에 등록</span>',
      '<span class="arr" style="color:rgba(255,255,255,.6);">▼</span>',
    '</div>',
    '<div class="sb open" style="padding:20px;">',
      '<p class="note" style="color:var(--r);font-weight:700;">',
        '⚠️ 영상은 URL 방식으로 등록하세요<br>',
        'Cloudinary/구글드라이브 등에 올린 후 직접 링크(mp4) 입력',
      '</p>',
      '<div style="margin-bottom:16px;">',
        '<label style="font-size:12px;font-weight:700;color:var(--r);display:block;margin-bottom:6px;">영상 URL (mp4 직접 링크)</label>',
        '<input id="heroVideoUrl" type="url" placeholder="https://...video.mp4" ',
          'style="width:100%;padding:10px;border:2px solid var(--r);border-radius:4px;font-size:13px;outline:none;">',
        '<p style="font-size:10px;color:#aaa;margin-top:4px;">예: https://res.cloudinary.com/xxx/video/upload/xxx.mp4</p>',
      '</div>',
      '<div>',
        '<label style="font-size:12px;font-weight:700;color:#555;display:block;margin-bottom:6px;">또는 배경 이미지 업로드 (영상 대신)</label>',
        '<div class="ii" id="ii-hero_video" style="max-width:260px;">',
          '<div class="prev" id="prev-hero-click"><img id="p-hero_video" src="" style="display:none;">',
            '<div class="ph"><span>이미지 업로드</span></div>',
          '</div>',
          '<div class="meta"><div class="key">hero_video</div>',
            '<div class="acts">',
              '<button class="bu" id="btn-hero-upload">이미지 업로드</button>',
              '<button class="br" id="btn-hero-del">삭제</button>',
            '</div>',
          '</div>',
          '<input type="file" id="f-hero_video" accept="image/*">',
        '</div>',
      '</div>',
    '</div>'
  ].join('');
  document.getElementById('app').insertAdjacentElement('afterbegin', div);

  // 이벤트 바인딩
  document.getElementById('prev-hero-click').onclick = function(){ document.getElementById('f-hero_video').click(); };
  document.getElementById('btn-hero-upload').onclick = function(){ document.getElementById('f-hero_video').click(); };
  document.getElementById('btn-hero-del').onclick = function(){ del('hero_video'); };
  document.getElementById('f-hero_video').onchange = function(){ load(this,'hero_video'); };
  document.getElementById('heroVideoUrl').addEventListener('input', saveVideoUrl);
  // 헤더 클릭
  div.querySelector('.sh').onclick = function(){ toggle(this); };
})();

function saveVideoUrl(){
  var url = document.getElementById('heroVideoUrl').value.trim();
  if(url){
    imgs['hero_video'] = url;
    document.getElementById('ii-hero_video').classList.add('has');
    changes++;document.getElementById('cc').textContent=changes;
  }
}

build();

// 기존 images.json 로드 시도
fetch('images.json').then(function(r){return r.json();}).then(function(data){
  imgs=data;
  Object.keys(imgs).forEach(function(k){
    var kd=k.replace(/_/g,'-');
    var p=document.getElementById('p-'+kd);
    var ii=document.getElementById('ii-'+kd);
    if(p&&imgs[k]&&!imgs[k].startsWith('http')){p.src=imgs[k];p.style.display='block';}
    if(ii)ii.classList.add('has');
  });
  // 영상 URL 복원
  if(imgs.hero_video && imgs.hero_video.startsWith('http')){
    var urlInput = document.getElementById('heroVideoUrl');
    if(urlInput) urlInput.value = imgs.hero_video;
  }
  toast('기존 images.js 로드 완료');
}).catch(function(){});
</script>
</body>
</html>
