<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>화미옥 어드민</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--r:#D4001A;--blk:#0A0A0A;}
body{background:#f5f5f5;font-family:'Noto Sans KR',sans-serif;font-weight:300;color:#1a1a1a;}
header{background:var(--r);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(212,0,26,.3);}
.ht{font-size:18px;font-weight:700;}.hs{font-size:11px;opacity:.7;margin-top:2px;}
.save-btn{background:#fff;color:var(--r);border:none;padding:10px 24px;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;}
.container{max-width:1100px;margin:0 auto;padding:24px 20px 80px;}
.section{background:#fff;border-radius:10px;margin-bottom:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.sh{padding:14px 20px;background:var(--blk);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.sh h2{color:#fff;font-size:14px;font-weight:700;}
.sh .cnt{background:var(--r);color:#fff;font-size:10px;padding:2px 8px;border-radius:100px;font-weight:700;}
.sh .arr{color:rgba(255,255,255,.4);margin-left:auto;transition:transform .3s;}
.sh.open .arr{transform:rotate(180deg);}
.sb{padding:20px;display:none;}
.sb.open{display:block;}
.note{font-size:11px;color:#999;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f0f0f0;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
.ii{border:2px solid #e8e8e8;border-radius:8px;overflow:hidden;transition:border-color .2s;}
.ii:hover{border-color:var(--r);}
.ii.has{border-color:#4caf50;}
.prev{width:100%;aspect-ratio:1;background:#f0f0f0;position:relative;overflow:hidden;cursor:pointer;}
.prev img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:#ccc;}
.ph span{font-size:9px;letter-spacing:1px;}
.ii.has .ph{display:none;}
.meta{padding:9px 11px;}
.key{font-size:10px;font-weight:700;color:var(--r);margin-bottom:2px;font-family:monospace;}
.desc{font-size:10px;color:#888;}
.acts{display:flex;gap:5px;margin-top:7px;}
.bu{flex:1;background:var(--r);color:#fff;border:none;padding:6px;font-size:10px;border-radius:3px;cursor:pointer;font-family:inherit;}
.br{background:#f5f5f5;color:#999;border:1px solid #ddd;padding:6px 9px;font-size:10px;border-radius:3px;cursor:pointer;font-family:inherit;}
.br:hover{background:#fee;color:var(--r);}
input[type=file]{display:none;}
.toast{position:fixed;bottom:80px;right:20px;background:var(--blk);color:#fff;padding:10px 18px;border-radius:5px;font-size:12px;z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{transform:none;opacity:1;}
.savebar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:3px solid var(--r);padding:10px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 -4px 16px rgba(0,0,0,.08);z-index:50;}
.sb-info{flex:1;font-size:12px;color:#888;}.sb-info strong{color:var(--r);}
@media(min-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax:220px,1fr));}}
</style>
</head>
<body>
<header>
  <div><div class="ht">화미옥 어드민</div><div class="hs">이미지 관리 · images.json 생성</div></div>
  <button class="save-btn" onclick="saveAll()">💾 JSON 저장</button>
</header>
<div class="container" id="app"></div>
<div class="savebar">
  <div class="sb-info">변경: <strong id="cc">0</strong>개 · JSON 저장 후 Vercel 루트에 업로드</div>
  <button class="save-btn" style="background:var(--r);color:#fff;" onclick="saveAll()">💾 JSON 저장</button>
</div>
<div class="toast" id="toast"></div>

<script>
var imgs = {};
var changes = 0;

var sections = [
  {
    title:'🎬 히어로 & 배경',
    items:[
      {key:'brand-visual-img', desc:'37년이 증명한다 원형 사진'},
      {key:'suitable-bg',      desc:'이런분께 딱입니다 배경'},
      {key:'importance-bg',    desc:'본사 중요성 섹션 배경'},
      {key:'process-bg',       desc:'창업 절차 배경'},
    ]
  },
  {
    title:'🍲 1분 조리 스텝',
    items:[
      {key:'step-img-0', desc:'STEP 01 — 육수 넣기'},
      {key:'step-img-1', desc:'STEP 02 — 식재료 넣기'},
      {key:'step-img-2', desc:'STEP 03 — 완성'},
    ]
  },
  {
    title:'☀️🌙 점심 / 저녁',
    items:[
      {key:'lunch-bg',  desc:'점심 섹션 배경'},
      {key:'dinner-bg', desc:'저녁 섹션 배경'},
    ]
  },
  {
    title:'🏆 성공 포인트',
    items:[
      {key:'why-img-0', desc:'성공포인트 01'},
      {key:'why-img-1', desc:'성공포인트 02'},
      {key:'why-img-2', desc:'성공포인트 03'},
      {key:'why-img-3', desc:'성공포인트 04'},
    ]
  },
  {
    title:'🥘 메뉴 이미지',
    note:'김치찌개(0) · 볶음/돈까스(1) · 김치찜(2) · 사이드(3)',
    items:[
      {key:'hm-0-0',desc:'돼지 김치찌개'},{key:'hm-0-1',desc:'부대 김치찌개'},
      {key:'hm-0-2',desc:'참치 김치찌개'},{key:'hm-0-3',desc:'돈까스 김치찌개'},
      {key:'hm-1-0',desc:'고추장 제육볶음'},{key:'hm-1-1',desc:'간장 돼지불고기'},{key:'hm-1-2',desc:'등심돈까스'},
      {key:'hm-2-0',desc:'돼지 김치찜'},{key:'hm-2-1',desc:'부대 김치찜'},
      {key:'hm-3-0',desc:'햄구이'},{key:'hm-3-1',desc:'계란말이'},
      {key:'hm-3-2',desc:'김치말이국수'},{key:'hm-3-3',desc:'주먹밥'},
    ]
  },
  {
    title:'🏠 인테리어',
    items:[
      {key:'interior-main',  desc:'인테리어 메인'},
      {key:'interior-sub-0', desc:'인테리어 서브 1'},
      {key:'interior-sub-1', desc:'인테리어 서브 2'},
      {key:'interior-sub-2', desc:'인테리어 서브 3'},
    ]
  },
  {
    title:'⭐ 리뷰 사진',
    note:'모바일 슬라이더 4장',
    items:[
      {key:'review-img-0',desc:'리뷰 1'},{key:'review-img-1',desc:'리뷰 2'},
      {key:'review-img-2',desc:'리뷰 3'},{key:'review-img-3',desc:'리뷰 4'},
    ]
  },
  {
    title:'🔥 브랜드',
    items:[
      {key:'brandA-bg', desc:'37년 증명한다 배경'},
    ]
  },
];

function build() {
  var app = document.getElementById('app');
  sections.forEach(function(sec, si) {
    var isFirst = si === 0;
    var html = '<div class="section"><div class="sh'+(isFirst?' open':'')+'" onclick="toggle(this)"><h2>'+sec.title+'</h2><span class="cnt">'+sec.items.length+'</span><span class="arr">▼</span></div>';
    html += '<div class="sb'+(isFirst?' open':'')+'">'; 
    if(sec.note) html += '<p class="note">'+sec.note+'</p>';
    html += '<div class="grid">';
    sec.items.forEach(function(item) {
      var k = item.key;
      html += '<div class="ii" id="ii-'+k+'">'
        +'<div class="prev" onclick="pick(\''+k+'\')">'
        +'<img id="p-'+k+'" src="" style="display:none;">'
        +'<div class="ph"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>업로드</span></div>'
        +'</div>'
        +'<div class="meta"><div class="key">'+k+'</div><div class="desc">'+item.desc+'</div>'
        +'<div class="acts"><button class="bu" onclick="pick(\''+k+'\')">업로드</button><button class="br" onclick="del(\''+k+'\')">삭제</button></div>'
        +'</div>'
        +'<input type="file" id="f-'+k+'" accept="image/*" onchange="load(this,\''+k+'\')">'
        +'</div>';
    });
    html += '</div></div></div>';
    app.innerHTML += html;
  });
}

function toggle(el){
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}
function pick(k){ document.getElementById('f-'+k).click(); }
function load(inp, k) {
  var f = inp.files[0]; if(!f) return;
  var r = new FileReader();
  r.onload = function(e){
    var data = e.target.result;
    imgs[k.replace(/-/g,'_')] = data;
    var p = document.getElementById('p-'+k);
    if(p){p.src=data;p.style.display='block';}
    document.getElementById('ii-'+k).classList.add('has');
    changes++;
    document.getElementById('cc').textContent=changes;
    toast('✓ '+k+' 업로드');
  };
  r.readAsDataURL(f);
}
function del(k){
  delete imgs[k.replace(/-/g,'_')];
  var p=document.getElementById('p-'+k);
  if(p){p.src='';p.style.display='none';}
  document.getElementById('ii-'+k).classList.remove('has');
  document.getElementById('f-'+k).value='';
  changes++;document.getElementById('cc').textContent=changes;
  toast('삭제: '+k);
}
function saveAll(){
  var blob=new Blob([JSON.stringify(imgs,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='images.json';a.click();
  changes=0;document.getElementById('cc').textContent='0';
  toast('💾 images.json 저장 완료!');
}
function toast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

build();

// 기존 images.json 로드 시도
fetch('images.json').then(function(r){return r.json();}).then(function(data){
  imgs=data;
  Object.keys(imgs).forEach(function(k){
    var kd=k.replace(/_/g,'-');
    var p=document.getElementById('p-'+kd);
    var ii=document.getElementById('ii-'+kd);
    if(p&&imgs[k]){p.src=imgs[k];p.style.display='block';}
    if(ii)ii.classList.add('has');
  });
  toast('기존 images.json 로드 완료');
}).catch(function(){});
</script>
</body>
</html>
